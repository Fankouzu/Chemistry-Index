# Build Android App Bundle (signed) and verify iOS Release build in CI.
# See docs/MOBILE_CI.md for required GitHub Secrets and optional IPA signing.

name: Mobile release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: mobile-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  android:
    name: Android (AAB)
    runs-on: ubuntu-latest
    # secrets cannot be used in step `if:` — compute once here (string "true" / "false").
    env:
      HAS_ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web + Capacitor sync
        run: npm run build && npx cap sync android

      - name: Grant execute permission for Gradle
        run: chmod +x android/gradlew

      - name: Decode release keystore
        if: ${{ env.HAS_ANDROID_KEYSTORE == 'true' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/release.keystore

      - name: Write keystore.properties
        if: ${{ env.HAS_ANDROID_KEYSTORE == 'true' }}
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > android/keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build release bundle (Play Store — requires keystore secrets)
        if: ${{ env.HAS_ANDROID_KEYSTORE == 'true' }}
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        if: ${{ env.HAS_ANDROID_KEYSTORE == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Build debug APK (CI smoke — add keystore secrets for AAB)
        if: ${{ env.HAS_ANDROID_KEYSTORE != 'true' }}
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        if: ${{ env.HAS_ANDROID_KEYSTORE != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  ios:
    name: iOS (Simulator Release build)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web + Capacitor sync
        run: npm run build && npx cap sync ios

      - name: Install CocoaPods dependencies
        working-directory: ios/App
        run: pod install

      - name: Build (iOS Simulator, Release)
        working-directory: ios/App
        run: |
          set -o pipefail
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Zip built app (optional artifact)
        working-directory: ios/App
        run: |
          APP_PATH=$(find build/DerivedData -name 'App.app' -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "App.app not found"
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" App-Simulator-Release.zip

      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-release-app
          path: ios/App/App-Simulator-Release.zip
          if-no-files-found: error

  # GitHub "Releases" page (not the same as workflow Artifacts — see docs/MOBILE_CI.md).
  release:
    name: Publish GitHub Release
    needs: [android, ios]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: '*'
          merge-multiple: true

      - name: Create release and attach builds
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
